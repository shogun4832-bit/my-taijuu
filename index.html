<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル体重記録ダッシュボード | アカウント機能付き</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; background: #e8f4f8; padding: 15px; border-radius: 8px; text-align: center; }
        .card .value { font-size: 24px; font-weight: bold; color: #007bff; }
        .form-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .secondary-btn { background: #6c757d; margin-top: 10px; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-bottom: 20px; }
        .history-list { list-style: none; padding: 0; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .delete-btn { background: #dc3545; padding: 5px 10px; width: auto; font-size: 12px; }
        
        /* ログイン画面のスタイル */
        #auth-container { max-width: 400px; margin: 100px auto; text-align: center; }
        #app-content { display: none; } /* 初期状態では隠しておく */
        .user-info { text-align: right; margin-bottom: 10px; font-size: 14px; }
        .logout-link { color: #dc3545; cursor: pointer; text-decoration: underline; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="auth-container" class="container">
        <h1>健康管理アプリ</h1>
        <p>データをクラウドに保存するために<br>ログインしてください</p>
        <div class="form-section">
            <div class="form-group"><input type="email" id="auth-email" placeholder="メールアドレス"></div>
            <div class="form-group"><input type="password" id="auth-password" placeholder="パスワード"></div>
            <button id="btn-login">ログイン</button>
            <button id="btn-signup" class="secondary-btn">新規登録</button>
        </div>
    </div>

    <div id="app-content" class="container">
        <div class="user-info">
            <span id="user-display-email"></span>
            <span class="logout-link" id="btn-logout">ログアウト</span>
        </div>
        <h1>健康管理ダッシュボード</h1>

        <div class="dashboard">
            <div class="card"><div>目標まであと</div><div class="value" id="diff-display">--</div></div>
            <div class="card"><div>現在のBMI</div><div class="value" id="bmi-display">--</div></div>
            <div class="card"><div>1日の消費カロリー</div><div class="value"><span id="tdee-display">--</span> kcal</div></div>
        </div>

        <div class="form-section">
            <h2>プロフィール設定</h2>
            <div class="form-group"><label>身長 (cm)</label><input type="number" id="height"></div>
            <div class="form-group"><label>目標体重 (kg)</label><input type="number" id="target-weight"></div>
            <div class="form-group"><label>年齢</label><input type="number" id="age"></div>
            <div class="form-group">
                <label>性別</label>
                <select id="gender"><option value="male">男性</option><option value="female">女性</option></select>
            </div>
            <div class="form-group">
                <label>活動レベル</label>
                <select id="activity">
                    <option value="1.2">ほぼ運動しない</option>
                    <option value="1.375">軽い運動（週1〜2回）</option>
                    <option value="1.55">中程度の運動（週3〜5回）</option>
                    <option value="1.725">激しい運動（週6〜7回）</option>
                </select>
            </div>
            <button id="btn-update-profile">設定を保存（クラウド同期）</button>
        </div>

        <div class="form-section">
            <h2>体重を記録</h2>
            <div class="form-group"><label>日付</label><input type="date" id="record-date"></div>
            <div class="form-group"><label>体重 (kg)</label><input type="number" id="record-weight" step="0.1"></div>
            <button id="btn-add-record">記録する（クラウド同期）</button>
        </div>

        <div class="chart-container"><canvas id="weightChart"></canvas></div>
        <h2>履歴</h2>
        <ul class="history-list" id="history-list"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ★★★ ここに自分の Firebase 設定を貼り付けてください ★★★
        const firebaseConfig = {
  apiKey: "AIzaSyCHGUpOH0X2qX1Kc7Xa_VePXirA_UZi52w",
  authDomain: "weightapp-c5e59.firebaseapp.com",
  databaseURL: "https://weightapp-c5e59-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "weightapp-c5e59",
  storageBucket: "weightapp-c5e59.firebasestorage.app",
  messagingSenderId: "468157108154",
  appId: "1:468157108154:web:e6652383d757386a5ed783",
  measurementId: "G-13JQESBDQ0"
};
        // ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let records = [];
        let profile = { height: 170, targetWeight: 60, age: 25, gender: 'male', activity: 1.55 };
        let chartInstance = null;

        // --- 認証状態の監視 ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('user-display-email').textContent = user.email;
                await loadCloudData(user.uid);
            } else {
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('app-content').style.display = 'none';
            }
        });

        // --- クラウドからデータを読み込む ---
        async function loadCloudData(uid) {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                records = data.records || [];
                profile = data.profile || profile;
                setFormValues();
                updateUI();
            } else {
                // 初めてのユーザーの場合
                setFormValues();
                updateUI();
            }
        }

        // --- クラウドへデータを保存する ---
        async function syncToCloud() {
            const user = auth.currentUser;
            if (user) {
                await setDoc(doc(db, "users", user.uid), { records, profile });
            }
        }

        // --- 各種ボタンイベント ---
        document.getElementById('btn-signup').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            try { await createUserWithEmailAndPassword(auth, email, password); } catch(e) { alert("エラー: " + e.message); }
        };

        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            try { await signInWithEmailAndPassword(auth, email, password); } catch(e) { alert("ログイン失敗: パスワードかメールが違います"); }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        document.getElementById('btn-add-record').onclick = async () => {
            const date = document.getElementById('record-date').value;
            const weight = parseFloat(document.getElementById('record-weight').value);
            if(!date || isNaN(weight)) return alert('入力を確認してください');
            records.push({ date, weight });
            records.sort((a, b) => new Date(a.date) - new Date(b.date));
            await syncToCloud();
            updateUI();
        };

        document.getElementById('btn-update-profile').onclick = async () => {
            profile.height = parseFloat(document.getElementById('height').value);
            profile.targetWeight = parseFloat(document.getElementById('target-weight').value);
            profile.age = parseFloat(document.getElementById('age').value);
            profile.gender = document.getElementById('gender').value;
            profile.activity = parseFloat(document.getElementById('activity').value);
            await syncToCloud();
            updateUI();
            alert('プロフィールを保存しました');
        };

        window.deleteRecord = async (index) => {
            records.splice(index, 1);
            await syncToCloud();
            updateUI();
        };

        // --- UI更新・計算ロジック ---
        function setFormValues() {
            document.getElementById('height').value = profile.height;
            document.getElementById('target-weight').value = profile.targetWeight;
            document.getElementById('age').value = profile.age;
            document.getElementById('gender').value = profile.gender;
            document.getElementById('activity').value = profile.activity;
            document.getElementById('record-date').valueAsDate = new Date();
        }

        function updateUI() {
            if (records.length > 0) {
                const latest = records[records.length - 1].weight;
                const hM = profile.height / 100;
                document.getElementById('bmi-display').textContent = (latest / (hM * hM)).toFixed(1);
                let bmr = (10 * latest) + (6.25 * profile.height) - (5 * profile.age) + (profile.gender === 'male' ? 5 : -161);
                document.getElementById('tdee-display').textContent = Math.round(bmr * profile.activity);
            }
            renderHistory();
            renderChart();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            [...records].reverse().forEach((r, i) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `<span>${r.date} - <strong>${r.weight} kg</strong></span><button class="delete-btn" onclick="deleteRecord(${records.length - 1 - i})">削除</button>`;
                list.appendChild(li);
            });
        }

        function renderChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: records.map(r => r.date),
                    datasets: [
                        { label: '体重 (kg)', data: records.map(r => r.weight), borderColor: '#007bff', backgroundColor: 'rgba(0,123,255,0.1)', fill: true },
                        { label: '目標', data: records.map(() => profile.targetWeight), borderColor: '#dc3545', borderDash: [5, 5], pointRadius: 0 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
